name: publish

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  python-checks:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e .[dev]
      - run: ruff check src tests scripts
      - run: pytest -q

  frontend-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm test
        working-directory: ui
      - run: npm run typecheck
        working-directory: ui
      - run: npm run build
        working-directory: ui

  build-dist:
    needs: [python-checks, frontend-checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui
      - name: Stage package assets
        run: |
          rm -rf src/ecm_studio/assets/ui
          rm -rf src/ecm_studio/assets/agents/skills
          mkdir -p src/ecm_studio/assets
          mkdir -p src/ecm_studio/assets/agents
          cp -R ui/dist src/ecm_studio/assets/ui
          cp -R .agents/skills src/ecm_studio/assets/agents/skills
      - run: pip install -e .[dev]
      - run: hatch build
      - run: twine check dist/*
      - name: Verify packaged assets
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          wheel = next(pathlib.Path("dist").glob("*.whl"))
          names = set(zipfile.ZipFile(wheel).namelist())
          assert "ecm_studio/assets/ui/index.html" in names
          assert "ecm_studio/assets/agents/skills/ecm-capability-manager/SKILL.md" in names
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/*

  publish-pypi:
    needs: build-dist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/ecm-studio
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
