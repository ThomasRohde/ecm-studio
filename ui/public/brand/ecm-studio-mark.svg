<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ECM Studio mark</title>
  <desc id="desc">A compact teal and blue tag-shaped ECM Studio app mark based on option 17.</desc>
  <defs>
    <linearGradient id="tag-fill" x1="72" y1="164" x2="456" y2="348" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d78c2"/>
      <stop offset="0.5" stop-color="#0e9f92"/>
      <stop offset="1" stop-color="#145a72"/>
    </linearGradient>
    <filter id="soft-depth" x="0" y="0" width="512" height="512" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#031018" flood-opacity="0.2"/>
    </filter>
    <mask id="tag-cutout">
      <rect width="512" height="512" fill="#000"/>
      <path d="M166 150H399C432 150 456 176 456 209V303C456 336 432 362 399 362H166L48 256Z" fill="#fff"/>
      <circle cx="134" cy="256" r="22" fill="#000"/>
    </mask>
  </defs>
  <g filter="url(#soft-depth)">
    <path d="M166 150H399C432 150 456 176 456 209V303C456 336 432 362 399 362H166L48 256Z" fill="none" stroke="#effdfa" stroke-width="14" stroke-linejoin="round"/>
    <path d="M166 150H399C432 150 456 176 456 209V303C456 336 432 362 399 362H166L48 256Z" fill="url(#tag-fill)" mask="url(#tag-cutout)"/>
    <path d="M166 150H399C432 150 456 176 456 209V303C456 336 432 362 399 362H166L48 256Z" fill="none" stroke="#0f3f56" stroke-opacity="0.42" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="134" cy="256" r="22" fill="none" stroke="#dff8f4" stroke-width="8"/>
    <text x="193" y="298" fill="#f8fffd" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="94" font-weight="700" letter-spacing="0" paint-order="stroke" stroke="#0b2330" stroke-opacity="0.24" stroke-width="4">ECM</text>
  </g>
</svg>
